        setTimeout(function () {

            var id = setInterval(frame, 10);
            function frame() {
                if (width >= 100) {

                } else {
                    width = width + 0.08;
                    elem.style.width = width + "%";
                }
            }
        }, 1000);
    });

    // 2. كود التحقق النهائي والمباشر (بدون رسالة كاشفة)
    function checkLogin() {
        var userField = document.getElementById("txtname");
        var passField = document.getElementById("txtpass");

        if (!userField || !passField) {
            return;
        }

        var username = userField.value;
        var password = passField.value;

        // البيانات الصحيحة المطلوبة للدخول
        var correctUser = "22510425"; 
        var correctPass = "11020077";

        if (username === correctUser && password === correctPass) {
            // الانتقال المباشر لصفحة النتيجة
            window.location.href = "Home - Nile Valley University.html";
        } else {
            // تنبيه فقط لو البيانات المكتوبة غلط
            alert("اسم المستخدم أو كلمة المرور غير صحيحة!");
        }
    }
